name: Deploy To EC2

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy target
        run: |
          set -euo pipefail
          aws sts get-caller-identity --region "${AWS_REGION}"
          aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text
          aws ssm describe-instance-information \
            --region "${AWS_REGION}" \
            --query "InstanceInformationList[?InstanceId=='${EC2_INSTANCE_ID}'].PingStatus" \
            --output text

      - name: Trigger EC2 deploy via SSM (remote build)
        id: ssm
        run: |
          set -euo pipefail
          PARAMS=$(jq -nc '[
            "set -e",
            "cd /opt/bristlecone-app",
            "git fetch origin main",
            "git checkout main",
            "git pull --ff-only origin main",
            "corepack pnpm install --frozen-lockfile",
            "export DATABASE_URL=${DATABASE_URL:-file:./prisma/.runtime/interviewbot.db}",
            "mkdir -p ./prisma/.runtime",
            "corepack pnpm prisma:generate",
            "corepack pnpm prisma:push",
            "corepack pnpm build",
            "npm --prefix /opt/bristlecone-app/agent-service install --omit=dev",
            "sudo systemctl restart bristlecone-agent.service",
            "sudo systemctl is-active bristlecone-agent.service",
            "sudo systemctl restart bristlecone-app.service",
            "sleep 2",
            "sudo systemctl is-active bristlecone-app.service",
            "cat .next/BUILD_ID"
          ]')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --region "${AWS_REGION}" \
            --query "Command.CommandId" \
            --output text \
            --parameters "commands=${PARAMS}")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}" --region "${AWS_REGION}"

      - name: Print SSM output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json
