name: Deploy To EC2

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ec2-main
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  DEPLOY_ENABLE_AGENT: "0"

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify deploy target
        run: |
          set -euo pipefail
          aws sts get-caller-identity --region "${AWS_REGION}"
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)
          echo "EC2 state: ${STATE}"
          if [ "${STATE}" != "running" ]; then
            aws ec2 start-instances --instance-ids "${EC2_INSTANCE_ID}" --region "${AWS_REGION}" >/dev/null
            aws ec2 wait instance-running --instance-ids "${EC2_INSTANCE_ID}" --region "${AWS_REGION}"
          fi

          echo "Waiting for SSM Online..."
          for _ in $(seq 1 30); do
            PING=$(aws ssm describe-instance-information \
              --region "${AWS_REGION}" \
              --query "InstanceInformationList[?InstanceId=='${EC2_INSTANCE_ID}'].PingStatus | [0]" \
              --output text)
            if [ "${PING}" = "Online" ]; then
              echo "SSM PingStatus: ${PING}"
              exit 0
            fi
            sleep 5
          done
          echo "Instance ${EC2_INSTANCE_ID} is not SSM Online."
          exit 1

      - name: Trigger EC2 deploy via SSM (remote build)
        id: ssm
        run: |
          set -euo pipefail
          PARAMS=$(jq -nc '[
            "set -e",
            "APP_DIR=/opt/bristlecone-app",
            "REPO_URL=https://github.com/ankurgarg-dev/LIVESTREAMBOT.git",
            "if [ ! -d \"$APP_DIR/.git\" ]; then if [ -d \"$APP_DIR\" ]; then mv \"$APP_DIR\" \"${APP_DIR}.bak.$(date +%s)\"; fi; git clone --depth 1 --branch main \"$REPO_URL\" \"$APP_DIR\"; fi",
            "cd \"$APP_DIR\"",
            "git remote set-url origin \"$REPO_URL\"",
            "git fetch origin main",
            "git checkout main",
            "git pull --ff-only origin main",
            "if ! command -v pnpm >/dev/null 2>&1; then if command -v corepack >/dev/null 2>&1; then corepack enable || true; corepack prepare pnpm@10.18.2 --activate || true; fi; fi",
            "if ! command -v pnpm >/dev/null 2>&1; then npm install -g pnpm; fi",
            "pnpm --version",
            "pnpm install --frozen-lockfile",
            "if [ -f /etc/bristlecone/app.env ]; then set -a; . /etc/bristlecone/app.env; set +a; fi",
            "export DATABASE_URL=${DATABASE_URL:-file:/opt/bristlecone-app/prisma/prisma/.runtime/interviewbot.db}",
            "mkdir -p ./prisma/.runtime ./prisma/prisma/.runtime",
            "pnpm prisma:generate",
            "pnpm prisma:push",
            "pnpm build",
            "sudo systemctl restart bristlecone-app.service",
            "sleep 2",
            "sudo systemctl is-active bristlecone-app.service",
            "if [ \"${DEPLOY_ENABLE_AGENT}\" = \"1\" ]; then npm --prefix /opt/bristlecone-app/agent-service install --omit=dev; sudo systemctl restart bristlecone-agent.service; sudo systemctl is-active bristlecone-agent.service; fi",
            "git rev-parse --short HEAD",
            "cat .next/BUILD_ID"
          ]')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --region "${AWS_REGION}" \
            --query "Command.CommandId" \
            --output text \
            --parameters "commands=${PARAMS}")
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"
          for _ in $(seq 1 540); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --region "${AWS_REGION}" \
              --query "Status" \
              --output text || true)
            echo "SSM status: ${STATUS}"
            case "${STATUS}" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated|ExecutionTimedOut|DeliveryTimedOut)
                echo "SSM command ended in terminal failure state: ${STATUS}"
                exit 1
                ;;
            esac
            sleep 5
          done

          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query "Status" \
            --output text)
          if [ "${FINAL_STATUS}" != "Success" ]; then
            echo "SSM command did not reach Success within timeout. Final status: ${FINAL_STATUS}"
            exit 1
          fi

      - name: Print SSM output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --region "${AWS_REGION}" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json
